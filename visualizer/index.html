<!DOCTYPE html>
<html>
<head>
<title>Dungeon Grid Visualizer</title>
<style>
body { margin: 0; overflow: hidden; background: #111; font-family: Arial; }
#info { position: absolute; top: 10px; left: 10px; color: #fff; z-index: 10; font-size: 13px; }
#info h3 { margin: 0 0 5px; color: #ffd700; }
#info p { margin: 2px 0; }
canvas { display: block; }
</style>
</head>
<body>
<div id="info">
<h3>Dungeon Grid Layout (Top-Down)</h3>
<p>Drag=rotate | Scroll=zoom | Right-drag=pan</p>
<p style="color:#0f0">Green outline=entrance | White=rooms | Colored=corridors w/doors</p>
</div>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 5000);
camera.position.set(200, 800, 400);
camera.lookAt(200, 0, -400);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(200, 0, -400);
controls.update();

scene.add(new THREE.AmbientLight(0x444444));
const dir = new THREE.DirectionalLight(0xffffff, 0.8);
dir.position.set(200, 500, 200);
scene.add(dir);

const grid = new THREE.GridHelper(1500, 75, 0x333333, 0x222222);
grid.position.set(200, -2, -400);
scene.add(grid);

// CONFIG (matching DungeonConfig.lua)
const startOffset = { x: -270, y: 5, z: -200 };
const gridSpacing = 180;
const cw = 16, ch = 16, t = 4;
const openingW = cw + 4;
const OVERLAP = 10;

const rooms = [
  { id:1,  grid:[1,0], name:"Crypt Entrance",    size:[120,22,120], color:0x666666 },
  { id:2,  grid:[2,0], name:"Forgotten Library",  size:[120,22,120], color:0x885522 },
  { id:3,  grid:[0,1], name:"Spider Nest",        size:[120,22,120], color:0x336633 },
  { id:4,  grid:[1,1], name:"Grand Hall (HUB)",   size:[120,22,120], color:0x888888 },
  { id:5,  grid:[2,1], name:"Armory",             size:[120,22,120], color:0x777777 },
  { id:6,  grid:[0,2], name:"Blood Altar",        size:[120,22,120], color:0x880000 },
  { id:7,  grid:[1,2], name:"Haunted Gallery",    size:[120,22,120], color:0x553366 },
  { id:8,  grid:[2,2], name:"Mage Tower",         size:[120,22,120], color:0x333366 },
  { id:9,  grid:[3,2], name:"Crystal Cavern",     size:[120,22,120], color:0x006688 },
  { id:10, grid:[0,3], name:"Bone Pit",           size:[120,22,120], color:0x888855 },
  { id:11, grid:[1,3], name:"Shadow Crypt",       size:[120,22,120], color:0x330033 },
  { id:12, grid:[2,3], name:"Knight Barracks",    size:[120,22,120], color:0x663333 },
  { id:13, grid:[1,4], name:"BOSS: Golem Throne", size:[120,28,120], color:0xcc3300 },
];

const corridors = [
  { from:1,  to:2,  dir:"Right" },                              // side branch
  { from:1,  to:4,  dir:"Down" },                               // main path
  { from:3,  to:4,  dir:"Right" },                              // left entrance
  { from:4,  to:5,  dir:"Right" },                              // right entrance
  { from:3,  to:6,  dir:"Down",  key:"Iron",   color:0xb4b4be }, // LEFT locked
  { from:6,  to:7,  dir:"Right" },                              // side
  { from:6,  to:10, dir:"Down" },                               // left continues
  { from:5,  to:8,  dir:"Down",  key:"Gold",   color:0xffd700 }, // RIGHT locked
  { from:8,  to:9,  dir:"Right" },                              // side
  { from:8,  to:12, dir:"Down" },                               // right continues
  { from:10, to:11, dir:"Right" },                              // merge left
  { from:11, to:12, dir:"Right" },                              // merge right
  { from:11, to:13, dir:"Down",  key:"Shadow", color:0x7832c8 }, // BOSS door
];

function getRoomById(id) { return rooms.find(r => r.id === id); }

function worldPos(room) {
  return {
    x: startOffset.x + room.grid[0] * gridSpacing,
    z: startOffset.z - room.grid[1] * gridSpacing
  };
}

// Compute openings for each room from corridors
const roomOpenings = {};
rooms.forEach(r => { roomOpenings[r.id] = new Set(); });
roomOpenings[1].add("Front"); // entrance
corridors.forEach(c => {
  if (c.dir === "Right") {
    roomOpenings[c.from].add("Right");
    roomOpenings[c.to].add("Left");
  } else {
    roomOpenings[c.from].add("Back");
    roomOpenings[c.to].add("Front");
  }
});

function drawFloor(cx, cz, w, d, color, y=0) {
  const geo = new THREE.PlaneGeometry(w, d);
  const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color, transparent:true, opacity:0.4, side:THREE.DoubleSide }));
  mesh.rotation.x = -Math.PI/2;
  mesh.position.set(cx, y, cz);
  scene.add(mesh);
}

function drawBoxOutline(cx, cz, w, d, color, y=0) {
  const hw=w/2, hd=d/2;
  const pts = [
    new THREE.Vector3(cx-hw,y,cz-hd), new THREE.Vector3(cx+hw,y,cz-hd),
    new THREE.Vector3(cx+hw,y,cz+hd), new THREE.Vector3(cx-hw,y,cz+hd),
    new THREE.Vector3(cx-hw,y,cz-hd),
  ];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  scene.add(new THREE.Line(geo, new THREE.LineBasicMaterial({ color })));
}

function drawWall(cx, cz, w, d, h, color, y=0) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color, transparent:true, opacity:0.25 }));
  mesh.position.set(cx, y+h/2, cz);
  scene.add(mesh);
  const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color:0x666666 }));
  wire.position.copy(mesh.position);
  scene.add(wire);
}

// Draw rooms
rooms.forEach(room => {
  const wp = worldPos(room);
  const [sx,sy,sz] = room.size;
  const opens = roomOpenings[room.id];

  drawFloor(wp.x, wp.z, sx, sz, room.color);
  drawBoxOutline(wp.x, wp.z, sx, sz, 0xffffff);

  // Label
  const c = document.createElement('canvas');
  c.width=512; c.height=128;
  const ctx = c.getContext('2d');
  ctx.fillStyle='#fff'; ctx.font='bold 36px Arial'; ctx.textAlign='center';
  ctx.fillText(`R${room.id}: ${room.name}`, 256, 45);
  ctx.fillStyle='#aaa'; ctx.font='24px Arial';
  ctx.fillText(`Grid(${room.grid[0]},${room.grid[1]}) | Opens: ${[...opens].join(',')}`, 256, 85);
  const tex = new THREE.CanvasTexture(c);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex }));
  sprite.position.set(wp.x, 25, wp.z);
  sprite.scale.set(70, 18, 1);
  scene.add(sprite);

  // Walls
  const ow = openingW;
  // Left (-X)
  if (opens.has("Left")) {
    const sd = (sz-ow)/2;
    drawWall(wp.x-sx/2-t/2, wp.z+(ow+sd)/2, t, sd, sy, 0x444444);
    drawWall(wp.x-sx/2-t/2, wp.z-(ow+sd)/2, t, sd, sy, 0x444444);
  } else drawWall(wp.x-sx/2-t/2, wp.z, t, sz, sy, 0x444444);
  // Right (+X)
  if (opens.has("Right")) {
    const sd = (sz-ow)/2;
    drawWall(wp.x+sx/2+t/2, wp.z+(ow+sd)/2, t, sd, sy, 0x444444);
    drawWall(wp.x+sx/2+t/2, wp.z-(ow+sd)/2, t, sd, sy, 0x444444);
  } else drawWall(wp.x+sx/2+t/2, wp.z, t, sz, sy, 0x444444);
  // Front (+Z)
  if (opens.has("Front")) {
    const sw = (sx-ow)/2;
    drawWall(wp.x-(ow+sw)/2, wp.z+sz/2+t/2, sw, t, sy, 0x444444);
    drawWall(wp.x+(ow+sw)/2, wp.z+sz/2+t/2, sw, t, sy, 0x444444);
  } else drawWall(wp.x, wp.z+sz/2+t/2, sx+t*2, t, sy, 0x444444);
  // Back (-Z)
  if (opens.has("Back")) {
    const sw = (sx-ow)/2;
    drawWall(wp.x-(ow+sw)/2, wp.z-sz/2-t/2, sw, t, sy, 0x444444);
    drawWall(wp.x+(ow+sw)/2, wp.z-sz/2-t/2, sw, t, sy, 0x444444);
  } else drawWall(wp.x, wp.z-sz/2-t/2, sx+t*2, t, sy, 0x444444);
});

// Draw entrance
{
  const r1 = getRoomById(1);
  const r1wp = worldPos(r1);
  const entZ = r1wp.z + r1.size[2]/2 + 30 + 25;
  drawFloor(r1wp.x, entZ, 50, 50, 0x555555);
  drawBoxOutline(r1wp.x, entZ, 50, 50, 0x00ff00);
  // Entrance corridor
  const fromZ = entZ - 25 + OVERLAP;
  const toZ = r1wp.z + r1.size[2]/2 - OVERLAP;
  const len = Math.abs(fromZ - toZ);
  const ctrZ = (fromZ + toZ) / 2;
  drawFloor(r1wp.x, ctrZ, cw, len, 0x333333);
  drawBoxOutline(r1wp.x, ctrZ, cw, len, 0x00ff00);
}

// Draw corridors
corridors.forEach(corr => {
  const fromRoom = getRoomById(corr.from);
  const toRoom = getRoomById(corr.to);
  const fwp = worldPos(fromRoom);
  const twp = worldPos(toRoom);
  const lineColor = corr.color || 0x555555;

  if (corr.dir === "Right") {
    // X corridor: same Z, between rooms
    const fromX = fwp.x + fromRoom.size[0]/2 - OVERLAP;
    const toX = twp.x - toRoom.size[0]/2 + OVERLAP;
    const z = fwp.z;
    const len = Math.abs(toX - fromX);
    const cx = (fromX + toX) / 2;
    drawFloor(cx, z, len, cw, lineColor);
    drawBoxOutline(cx, z, len, cw, lineColor);

    if (corr.key) {
      const doorGeo = new THREE.SphereGeometry(4, 16, 16);
      const doorMesh = new THREE.Mesh(doorGeo, new THREE.MeshStandardMaterial({ color:corr.color, emissive:corr.color, emissiveIntensity:0.5 }));
      doorMesh.position.set(cx, 10, z);
      scene.add(doorMesh);
      // Door label
      const c = document.createElement('canvas');
      c.width=256; c.height=64;
      const ctx = c.getContext('2d');
      ctx.fillStyle=`#${corr.color.toString(16).padStart(6,'0')}`; ctx.font='bold 28px Arial'; ctx.textAlign='center';
      ctx.fillText(corr.key + ' Door', 128, 40);
      const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c) }));
      spr.position.set(cx, 25, z);
      spr.scale.set(30, 8, 1);
      scene.add(spr);
    }
  } else {
    // Z corridor: same X, between rooms
    const fromZ = fwp.z - fromRoom.size[2]/2 + OVERLAP;
    const toZ = twp.z + toRoom.size[2]/2 - OVERLAP;
    const x = fwp.x;
    const len = Math.abs(toZ - fromZ);
    const cz = (fromZ + toZ) / 2;
    drawFloor(x, cz, cw, len, lineColor);
    drawBoxOutline(x, cz, cw, len, lineColor);

    if (corr.key) {
      const doorGeo = new THREE.SphereGeometry(4, 16, 16);
      const doorMesh = new THREE.Mesh(doorGeo, new THREE.MeshStandardMaterial({ color:corr.color, emissive:corr.color, emissiveIntensity:0.5 }));
      doorMesh.position.set(x, 10, cz);
      scene.add(doorMesh);
      const c = document.createElement('canvas');
      c.width=256; c.height=64;
      const ctx = c.getContext('2d');
      ctx.fillStyle=`#${corr.color.toString(16).padStart(6,'0')}`; ctx.font='bold 28px Arial'; ctx.textAlign='center';
      ctx.fillText(corr.key + ' Door', 128, 40);
      const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c) }));
      spr.position.set(x, 25, cz);
      spr.scale.set(30, 8, 1);
      scene.add(spr);
    }
  }
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
